
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>USAEX — The American Decentralized Exchange</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    color: white;
    height: 100vh;
    overflow-x: hidden;
}

/* ===== BACKGROUND ===== */
.hero {
    background: 
        linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.85)),
        url("background.jpg") center/cover no-repeat;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ===== NAVBAR ===== */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
}

.logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 600;
}

.logo span {
    color: #ff2b2b;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 30px;
}

nav a {
    text-decoration: none;
    color: white;
    font-weight: 400;
    transition: 0.3s;
}

nav a:hover {
    color: #ff2b2b;
}

/* ===== HERO CONTENT ===== */
.content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 64px;
    letter-spacing: 2px;
}

h1 span {
    color: #ff2b2b;
}

.tagline {
    margin-top: 20px;
    font-size: 22px;
    opacity: 0.9;
}

.subtext {
    margin-top: 15px;
    font-size: 18px;
    opacity: 0.75;
}

/* ===== BUTTONS ===== */
.buttons {
    margin-top: 40px;
    display: flex;
    gap: 20px;
}

.btn {
    padding: 16px 32px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

.primary {
    background: #ff2b2b;
    color: white;
}

.primary:hover {
    background: #cc1f1f;
}

.secondary {
    border: 1px solid white;
    color: white;
}

.secondary:hover {
    background: white;
    color: black;
}

/* ===== FEATURES ===== */
.features {
    position: absolute;
    bottom: 40px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 60px;
    text-align: center;
    font-size: 16px;
}

.feature strong {
    display: block;
    margin-bottom: 5px;
    font-size: 18px;
}

@media (max-width: 768px) {

    h1 {
        font-size: 42px;
    }

    nav {
        padding: 20px;
    }

    .features {
        flex-direction: column;
        gap: 15px;
        bottom: 20px;
    }
}

</style>
</head>

<body>

<div class="hero">

    <!-- NAVBAR -->
    <nav>
        <div class="logo">USA<span>EX</span></div>

        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Exchange</a></li>
            <li><a href="#">Docs</a></li>
            <li><a href="#">Security</a></li>
        </ul>
    </nav>

    <!-- HERO CONTENT -->
    <div class="content">
        <h1>TRADE FREELY.<br><span>TRADE SECURELY.</span></h1>

        <p class="tagline">
            The American Decentralized Exchange
        </p>

        <p class="subtext">
            Non-Custodial • No KYC • Proof-of-Work Focused
        </p>

        <div class="buttons">
            <a href="#" class="btn primary">Launch DApp</a>
            <a href="#" class="btn secondary">Connect Wallet</a>
        </div>
    </div>

    <!-- FEATURES -->
    <div class="features">
        <div class="feature">
            <strong>No Custody</strong>
            You control your keys
        </div>

        <div class="feature">
            <strong>No KYC</strong>
            Trade privately
        </div>

        <div class="feature">
            <strong>Proof-of-Work</strong>
            Mineable assets supported
        </div>
    </div>

</div>

</body>
</html>
